{% extends 'base.html' %}

{% block title %}
   Form Siswa
{% endblock %}

{% block content %}
<form method="post" class="space-y-5">
    <!-- token keamanan anti-CSRF -->
    {% csrf_token %}

    <!-- form inputannya disini ntar -->
    <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Nama</label>
        <input type="text" name="nama" value="{{siswa.nama}}" required
               class="w-full px-4 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>
    <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Umur</label>
        <input type="number" name="umur" value="{{siswa.umur}}" required
               class="w-full px-4 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>
    <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Tgl Lahir</label>
        <input type="date" name="tgl_lahir" value="{{ siswa.tgl_lahir|date:'Y-m-d' }}" required
               class="w-full px-4 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>
    <div>
        <label class="block text-sm font-medium text-slate-700 mb-2">
            Status Hadir
        </label>
        <div class="flex items-center gap-4">
            <label class="flex items-center gap-2 text-sm tex-slate-700">
                <input type="radio" name="status_hadir" value="true" {% if siswa.status_hadir %}checked{% endif %} required class="text-blue-500 focus:ring-blue-500">
                Hadir
            </label>
        </div>
        <div class="flex items-center gap-4">
            <label class="flex items-center gap-2 text-sm tex-slate-700">
                <input type="radio" name="status_hadir" value="false" {% if not siswa.status_hadir %}checked{% endif %} required class="text-blue-500 focus:ring-blue-500">
                Tidak Hadir
            </label>
        </div>
    </div>
    
    <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Nilai Akhir</label>
        <input type="text" name="nilai_akhir" value="{{siswa.nilai_akhir}}" required
               class="w-full px-4 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>
    
    <div class="flex gap-3 pt-2">
        <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700">
            Simpan
        </button>

        <a href="{% url 'siswa_list' %}"
           class="px-4 py-2 bg-slate-100 text-slate-700 rounded-lg text-sm font-medium hover:bg-slate-200">
            Batal
        </a>
    </div>
</form>
{% endblock %}
